<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Crew · 일정 조율</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Lora:ital,wght@1,500;1,600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --starbucks-green: #006241;
    --green-accent:    #00754A;
    --house-green:     #1E3932;
    --green-light:     #d4e9e2;
    --gold:            #cba258;
    --gold-lightest:   #faf6ee;
    --neutral-warm:    #f2f0eb;
    --ceramic:         #edebe9;
    --text-black:      rgba(0, 0, 0, 0.87);
    --text-black-soft: rgba(0, 0, 0, 0.58);
    --text-white-soft: rgba(255, 255, 255, 0.70);
    --border-hairline: #e7e7e7;
    --input-border:    #d6dbde;
    --danger:          #c0392b;
    --danger-soft:     #fdecea;
    --shadow-card: 0 0 0.5px rgba(0,0,0,0.14), 0 1px 1px rgba(0,0,0,0.24);
    --shadow-nav:  0 1px 3px rgba(0,0,0,0.10), 0 2px 2px rgba(0,0,0,0.06);
    --shadow-lift: 0 8px 24px rgba(0,0,0,0.10);
    --radius-card: 12px;
    --radius-pill: 50px;
    --font-sans:   'Manrope', 'Noto Sans KR', 'Helvetica Neue', sans-serif;
    --font-serif:  'Lora', Georgia, serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans);
    font-size: 16px; line-height: 1.55;
    letter-spacing: -0.01em;
    color: var(--text-black);
    background: var(--neutral-warm);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── Nav ─────────────────────────────────────── */
  .nav {
    position: sticky; top: 0; z-index: 30;
    background: #fff;
    height: 68px;
    display: flex; align-items: center;
    padding: 0 32px; gap: 16px;
    box-shadow: var(--shadow-nav);
  }
  .mark {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--starbucks-green); color: #fff;
    display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
    border: 1.5px solid #fff; box-shadow: inset 0 0 0 1.5px var(--starbucks-green);
  }
  .brand-name { font-weight: 700; font-size: 15px; letter-spacing: -0.3px; white-space: nowrap; }
  .brand-block { flex-shrink: 0; }
  .brand-sub  { font-size: 12px; color: var(--text-black-soft); font-weight: 500; }
  .nav-right { margin-left: auto; display: flex; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border-radius: var(--radius-pill);
    padding: 10px 20px;
    font-family: var(--font-sans); font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em;
    border: 1px solid transparent; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
    transition: transform 0.2s ease, filter 0.2s ease, background 0.2s ease;
  }
  .btn:active:not(:disabled) { transform: scale(0.96); }
  .btn-primary  { background: var(--green-accent); color: #fff; border-color: var(--green-accent); }
  .btn-primary:hover:not(:disabled) { filter: brightness(0.95); }
  .btn-outlined { background: transparent; color: var(--green-accent); border-color: var(--green-accent); }
  .btn-outlined:hover { background: rgba(0,117,74,0.06); }
  .btn-dark-out { background: transparent; color: var(--text-black); border-color: var(--text-black); }
  .btn-dark-out:hover { background: rgba(0,0,0,0.04); }
  .btn-ghost    { background: transparent; color: var(--green-accent); border-color: transparent; padding: 8px 14px; }
  .btn-ghost:hover { background: rgba(0,117,74,0.08); }
  .btn-danger   { background: var(--danger); color: #fff; border-color: var(--danger); padding: 6px 14px; font-size: 13px; }
  .btn-danger:hover { filter: brightness(0.92); }
  .btn-lg { padding: 14px 32px; font-size: 15px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Hero ────────────────────────────────────── */
  .hero { max-width: 980px; margin: 0 auto; padding: 56px 32px 32px; text-align: center; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--green-accent);
    margin-bottom: 18px;
    white-space: nowrap;
  }
  .eyebrow::before, .eyebrow::after { content: ''; width: 24px; height: 1.5px; background: var(--green-accent); }
  .hero h1 {
    font-family: var(--font-sans);
    font-size: 56px; font-weight: 700;
    color: var(--starbucks-green);
    letter-spacing: -1.2px; line-height: 1.1;
    margin: 0 0 14px;
  }
  .hero h1 .serif { font-family: var(--font-serif); font-style: italic; font-weight: 500; color: var(--gold); }
  .hero p {
    font-size: 19px; color: var(--text-black-soft);
    letter-spacing: -0.16px; max-width: 560px; margin: 0 auto;
  }

  /* ── Section ─────────────────────────────────── */
  .shell { max-width: 980px; margin: 0 auto; padding: 0 32px; }

  .section { margin-top: 48px; }
  .section-head { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .section-num {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--starbucks-green); color: #fff;
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px; flex-shrink: 0;
  }
  .section h2 {
    font-size: 22px; font-weight: 700;
    color: var(--text-black); letter-spacing: -0.4px;
    margin: 0; line-height: 1.25;
    white-space: nowrap;
  }
  .section-hint { font-size: 14px; color: var(--text-black-soft); margin-left: auto; white-space: nowrap; }

  /* ── Members ─────────────────────────────────── */
  .members-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .member-card {
    background: #fff;
    padding: 18px 16px;
    border-radius: 14px;
    display: flex; align-items: center; gap: 10px;
    border: 1.5px solid var(--border-hairline);
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .member-card:hover { border-color: var(--green-accent); transform: translateY(-1px); box-shadow: var(--shadow-card); }
  .member-card.selected {
    background: var(--starbucks-green); border-color: var(--starbucks-green);
    box-shadow: 0 4px 16px rgba(0,98,65,0.25);
  }
  .member-card.selected .member-name { color: #fff; }
  .member-card.selected .avatar { background: var(--gold); color: var(--house-green); }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--green-light); color: var(--starbucks-green);
    display: grid; place-items: center;
    font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .member-name { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; color: var(--text-black); }

  /* ── Dates ───────────────────────────────────── */
  .date-input-group {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .date-card, .unavailable-card {
    background: #fff;
    padding: 24px 20px;
    border-radius: 16px;
    border: 1.5px solid var(--border-hairline);
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    text-align: center;
    min-height: 130px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative;
  }
  .date-card:hover { border-color: var(--green-accent); transform: translateY(-2px); box-shadow: var(--shadow-card); }
  .date-card.selected {
    background: var(--starbucks-green); border-color: var(--starbucks-green);
    box-shadow: 0 4px 16px rgba(0,98,65,0.25);
  }
  .date-card.selected .date-text, .date-card.selected .day-text { color: #fff; }
  .date-card.selected .day-text { color: rgba(255,255,255,0.75); }
  .date-card.selected::after {
    content: '✓'; position: absolute; top: 10px; right: 12px;
    color: var(--gold); font-weight: 700; font-size: 16px;
  }
  .date-text { font-weight: 700; font-size: 26px; color: var(--text-black); letter-spacing: -0.8px; margin-bottom: 4px; }
  .day-text  { font-size: 13px; color: var(--text-black-soft); font-weight: 500; letter-spacing: 0.05em; }

  .unavailable-card { border-color: var(--border-hairline); border-style: dashed; }
  .unavailable-card:hover:not(.disabled) { border-color: var(--danger); border-style: solid; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(192,57,43,0.15); }
  .unavailable-card.selected {
    background: var(--danger-soft); border-color: var(--danger); border-style: solid;
  }
  .unavailable-card.selected .unavailable-text { color: var(--danger); }
  .unavailable-card.disabled { opacity: 0.45; cursor: not-allowed; }
  .unavailable-text { font-weight: 600; font-size: 14px; color: var(--text-black-soft); letter-spacing: -0.01em; line-height: 1.35; }
  .unavailable-card::before {
    content: '⊘'; display: block; font-size: 20px; color: var(--text-black-soft); margin-bottom: 8px;
  }
  .unavailable-card.selected::before { color: var(--danger); }

  /* ── Submit ──────────────────────────────────── */
  .submit-section { margin: 40px 0 24px; display: flex; justify-content: center; }

  /* ── Schedule table ──────────────────────────── */
  .schedule-wrap {
    background: #fff; border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .schedule-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 14px;
  }
  .schedule-table th {
    background: var(--house-green); color: #fff;
    padding: 14px 16px; text-align: center;
    font-weight: 600; font-size: 13px;
    letter-spacing: -0.01em;
  }
  .schedule-table th:first-child { text-align: left; padding-left: 20px; }
  .schedule-table td {
    padding: 14px 16px; text-align: center;
    border-top: 1px solid var(--border-hairline);
    color: var(--text-black); font-size: 14px;
  }
  .schedule-table td:first-child { text-align: left; padding-left: 20px; }
  .schedule-table tbody tr.current-user td { background: var(--gold-lightest); }
  .schedule-table tbody tr.not-submitted td { color: var(--text-black-soft); font-style: italic; background: #fafafa; }
  .schedule-table tr.total-row td { background: var(--neutral-warm); font-weight: 700; }
  .schedule-table tr.total-row td:first-child { color: var(--starbucks-green); }

  .member-name-cell {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .member-name-cell strong { font-weight: 600; font-size: 14px; }
  .me-tag {
    display: inline-block; margin-left: 6px;
    background: var(--gold); color: var(--house-green);
    padding: 2px 8px; border-radius: 50px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em;
  }
  .edit-btn {
    background: transparent; color: var(--green-accent);
    border: 1px solid rgba(0,117,74,0.3);
    padding: 4px 12px; font-size: 12px; font-weight: 600;
    border-radius: 50px; cursor: pointer;
    transition: all 0.2s;
  }
  .edit-btn:hover { background: var(--green-accent); color: #fff; border-color: var(--green-accent); }

  .check-yes { color: var(--starbucks-green); font-size: 18px; font-weight: 700; }
  .check-no  { color: var(--text-black-soft); }

  .attendance-count {
    font-size: 16px; font-weight: 700; color: var(--starbucks-green);
  }
  .attendance-count .total { color: var(--text-black-soft); font-weight: 500; font-size: 13px; }

  /* ── Result box — gold hero card ─────────────── */
  .result-box {
    margin-top: 32px;
    background: linear-gradient(135deg, var(--gold-lightest) 0%, #fff 100%);
    border: 1px solid rgba(203,162,88,0.3);
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: var(--shadow-lift);
    position: relative;
    overflow: hidden;
  }
  .result-box::before {
    content: '★'; position: absolute; top: 16px; right: 20px;
    color: var(--gold); font-size: 20px;
  }
  .result-eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: 0.2em;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 14px;
  }
  .result-box h3 {
    font-size: 15px; color: var(--text-black-soft);
    font-weight: 500; margin-bottom: 14px; letter-spacing: -0.01em;
  }
  .best-date-text {
    font-family: var(--font-sans);
    font-size: 38px; font-weight: 700;
    color: var(--starbucks-green);
    letter-spacing: -1px; line-height: 1.2;
    margin: 4px 0 16px;
  }
  .attendance-text {
    display: inline-flex; align-items: center; gap: 8px;
    background: #fff; padding: 8px 18px; border-radius: 50px;
    font-size: 14px; font-weight: 600; color: var(--text-black);
    box-shadow: var(--shadow-card);
  }
  .attendance-text .pct { color: var(--gold); }
  .copy-btn {
    margin-top: 22px;
    background: var(--starbucks-green); color: #fff;
    border: 1px solid var(--starbucks-green);
    padding: 12px 28px;
    font-size: 14px; font-weight: 600;
    border-radius: var(--radius-pill);
    cursor: pointer; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .copy-btn:hover { filter: brightness(0.92); }
  .copy-btn:active { transform: scale(0.96); }

  /* Empty result */
  .result-empty {
    margin-top: 32px;
    background: #fff; border: 1px dashed var(--input-border);
    border-radius: 16px; padding: 32px;
    text-align: center; color: var(--text-black-soft);
  }
  .result-empty h3 { font-size: 16px; color: var(--text-black); font-weight: 600; margin-bottom: 6px; }

  /* ── Modal ───────────────────────────────────── */
  .modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(30,57,50,0.55);
    z-index: 1000;
    justify-content: center; align-items: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal.active { display: flex; }
  .modal-content {
    background: #fff;
    border-radius: 20px;
    padding: 36px;
    max-width: 480px; width: 100%;
    max-height: 85vh; overflow-y: auto;
    box-shadow: var(--shadow-lift);
  }
  .modal-header {
    font-size: 24px; font-weight: 700;
    margin-bottom: 8px; color: var(--starbucks-green);
    letter-spacing: -0.5px;
  }
  .modal-sub { font-size: 14px; color: var(--text-black-soft); margin-bottom: 24px; }
  .modal-input-group { display: flex; gap: 8px; margin-bottom: 20px; }
  .modal-input {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--input-border);
    border-radius: 12px;
    font-size: 15px; font-family: var(--font-sans);
    transition: border-color 0.2s;
  }
  .modal-input:focus { outline: none; border-color: var(--green-accent); }

  .modal-members-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .modal-member-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    background: var(--neutral-warm);
    border-radius: 10px;
  }
  .modal-member-item .name-row { display: flex; align-items: center; gap: 10px; }
  .modal-member-item .avatar { width: 26px; height: 26px; font-size: 12px; }
  .modal-member-name { font-size: 14px; font-weight: 600; color: var(--text-black); }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  /* ── Loading ─────────────────────────────────── */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(242,240,235,0.96);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 18px;
    z-index: 9999;
    transition: opacity 0.3s ease;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 46px; height: 46px;
    border: 3px solid var(--green-light);
    border-top-color: var(--starbucks-green);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-black-soft); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }

  /* ── Empty state ─────────────────────────────── */
  .empty-state {
    text-align: center; padding: 32px;
    color: var(--text-black-soft); font-size: 14px;
    background: var(--neutral-warm); border-radius: 12px;
  }

  /* ── Responsive ──────────────────────────────── */
  @media (max-width: 720px) {
    .nav { padding: 0 20px; }
    .brand-sub { display: none; }
    .shell, .hero { padding-left: 20px; padding-right: 20px; }
    .hero h1 { font-size: 36px; }
    .hero p { font-size: 16px; }
    .date-input-group { grid-template-columns: repeat(2, 1fr); }
    .members-list { grid-template-columns: repeat(2, 1fr); }
    .schedule-table th, .schedule-table td { padding: 10px 8px; font-size: 12px; }
    .best-date-text { font-size: 26px; }
    .member-name-cell { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
<body>

<!-- Loading overlay -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading your schedule</div>
</div>

<!-- Nav -->
<nav class="nav">
  <div class="mark">AI</div>
  <div class="brand-block">
    <div class="brand-name">AI Study Crew</div>
    <div class="brand-sub">주간 모임 일정 조율</div>
  </div>
  <div class="nav-right">
    <button class="btn btn-dark-out" onclick="openManageModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      멤버 관리
    </button>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="eyebrow">This Week · Wed · Thu · Fri</div>
  <h1>모두의 일정을<br><span class="serif">한 잔에 담다</span></h1>
  <p>매주 가능한 날을 체크하면, 최적의 모임 날짜를 자동으로 찾아드립니다.</p>
</section>

<div class="shell">

  <!-- 1. Member select -->
  <section class="section">
    <div class="section-head">
      <span class="section-num">1</span>
      <h2>본인을 선택해주세요</h2>
    </div>
    <div class="members-list" id="membersList"></div>
  </section>

  <!-- 2. Dates -->
  <section class="section">
    <div class="section-head">
      <span class="section-num">2</span>
      <h2>참석 가능한 날짜를 선택해주세요</h2>
      <span class="section-hint">여러 날짜 선택 가능</span>
    </div>
    <div class="date-input-group" id="datesListContainer"></div>
  </section>

  <!-- Submit -->
  <div class="submit-section">
    <button class="btn btn-primary btn-lg" id="submitBtn" onclick="submitSelection()" disabled>
      입력 완료
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
  </div>

  <!-- 3. Attendance -->
  <section class="section">
    <div class="section-head">
      <span class="section-num">3</span>
      <h2>참석 현황</h2>
    </div>
    <div id="scheduleTableContainer"></div>
  </section>

  <!-- Result -->
  <div id="resultBox"></div>

</div>

<!-- Manage modal -->
<div class="modal" id="manageModal">
  <div class="modal-content">
    <h2 class="modal-header">멤버 관리</h2>
    <p class="modal-sub">크루에 함께할 멤버를 관리하세요.</p>
    <div class="modal-input-group">
      <input type="text" class="modal-input" id="newMemberInput" placeholder="새 멤버 이름">
      <button class="btn btn-primary" onclick="addNewMember()">추가</button>
    </div>
    <div class="modal-members-list" id="modalMembersList"></div>
    <div class="modal-actions">
      <button class="btn btn-outlined" style="flex:1" onclick="closeManageModal()">닫기</button>
    </div>
  </div>
</div>

<script>
  // ── Google Apps Script URL ──
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2CCEL-5_-BHuSrVxEzSyQGmoFEfXyPGniQ_spVDmeBmtxoBajTboZuo_xK9ngyHIv7A/exec';

  let allMembers = ['김근아', '나희진', '이상용', '이예진', '이용성', '조인주', '황성욱'];
  let selectedMember = null;
  let selectedDates = [];
  let availability = {};
  let submittedMembers = {};
  let currentSavingMember = null;
  let currentSavingDates = [];
  let currentSavingUnavailable = false;
  let unavailableSelected = false;

  // ISO week helpers
  function getISOWeekString(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return d.getUTCFullYear() + '-W' + (weekNo < 10 ? '0' : '') + weekNo;
  }
  function getCurrentWeekId() {
    const today = new Date();
    const currentDay = today.getDay();
    const mon = new Date(today);
    if (currentDay === 0) mon.setDate(today.getDate() - 6);
    else mon.setDate(today.getDate() + (1 - currentDay));
    return getISOWeekString(mon);
  }
  function getThisWeekDates() {
    const today = new Date();
    const currentDay = today.getDay();
    const targets = [
      { day: 3, name: '수요일', key: 'wed' },
      { day: 4, name: '목요일', key: 'thu' },
      { day: 5, name: '금요일', key: 'fri' }
    ];
    return targets.map(t => {
      const d = new Date(today);
      d.setDate(today.getDate() + (t.day - currentDay));
      return { value: t.key, display: `${d.getMonth()+1}월 ${d.getDate()}일`, dayName: t.name };
    });
  }
  const weekDates = getThisWeekDates();

  function avatarInitial(name) {
    if (!name) return '';
    return name.charAt(name.length >= 2 ? 1 : 0);
  }

  function hideLoading() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) {
      overlay.classList.add('hidden');
      setTimeout(() => { overlay.style.display = 'none'; }, 300);
    }
  }

  async function loadData() {
    selectedMember = null;
    selectedDates = [];
    renderMembers(); renderDates(); renderScheduleTable(); updateBestDate();
    hideLoading();

    const weekId = getCurrentWeekId();
    try {
      const r = await fetch(SCRIPT_URL + '?action=load&weekId=' + encodeURIComponent(weekId), { cache: 'no-cache' });
      const data = await r.json();
      if (data.success) {
        if (data.members) allMembers = data.members;
        if (data.availability) availability = data.availability;
        if (data.submittedMembers) submittedMembers = data.submittedMembers;
        renderMembers(); renderScheduleTable(); updateBestDate();
      }
    } catch (e) { console.error('데이터 로드 실패:', e); }

    setInterval(async () => {
      try {
        const r = await fetch(SCRIPT_URL + '?action=load&weekId=' + encodeURIComponent(weekId), { cache: 'no-cache' });
        const data = await r.json();
        if (data.success) {
          if (data.members) allMembers = data.members;
          if (data.availability) availability = data.availability;
          if (data.submittedMembers) submittedMembers = data.submittedMembers;
          renderMembers(); renderScheduleTable(); updateBestDate();
        }
      } catch (e) { console.error('자동 새로고침 실패:', e); }
    }, 10000);
  }

  async function saveData() {
    try {
      const weekId = getCurrentWeekId();
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'save', weekId,
          memberName: currentSavingMember,
          memberDates: currentSavingDates,
          isUnavailable: currentSavingUnavailable
        })
      });
    } catch (e) { console.error('데이터 저장 실패:', e); }
  }

  async function saveMembersOnly(deletedMember) {
    try {
      const weekId = getCurrentWeekId();
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'saveMembers', weekId,
          members: allMembers, deletedMember: deletedMember || null
        })
      });
    } catch (e) { console.error('멤버 목록 저장 실패:', e); }
  }

  // ── Modal ──
  function openManageModal() {
    document.getElementById('manageModal').classList.add('active');
    renderModalMembers();
  }
  function closeManageModal() {
    document.getElementById('manageModal').classList.remove('active');
    document.getElementById('newMemberInput').value = '';
  }
  function renderModalMembers() {
    const c = document.getElementById('modalMembersList');
    if (allMembers.length === 0) { c.innerHTML = '<div class="empty-state">등록된 멤버가 없습니다.</div>'; return; }
    c.innerHTML = allMembers.map(m => `
      <div class="modal-member-item">
        <div class="name-row">
          <div class="avatar">${avatarInitial(m)}</div>
          <span class="modal-member-name">${m}</span>
        </div>
        <button class="btn btn-danger" onclick="deleteMember('${m}')">삭제</button>
      </div>
    `).join('');
  }
  function addNewMember() {
    const input = document.getElementById('newMemberInput');
    const name = input.value.trim();
    if (!name) { alert('멤버 이름을 입력해주세요.'); return; }
    if (allMembers.includes(name)) { alert('이미 등록된 멤버입니다.'); return; }
    allMembers.push(name);
    input.value = '';
    saveMembersOnly();
    renderModalMembers(); renderMembers(); renderScheduleTable(); updateBestDate();
  }
  function deleteMember(name) {
    if (!confirm(`${name}을(를) 삭제하시겠습니까?\n해당 멤버의 모든 참석 정보가 삭제됩니다.`)) return;
    allMembers = allMembers.filter(m => m !== name);
    if (selectedMember === name) selectedMember = null;
    for (let date in availability) if (availability[date][name]) delete availability[date][name];
    if (submittedMembers[name]) delete submittedMembers[name];
    saveMembersOnly(name);
    renderModalMembers(); renderMembers(); renderScheduleTable(); updateBestDate();
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('newMemberInput').addEventListener('keypress', e => { if (e.key === 'Enter') addNewMember(); });
    document.getElementById('manageModal').addEventListener('click', function(e) { if (e.target === this) closeManageModal(); });
  });

  function selectMember(name) {
    selectedMember = name;
    selectedDates = [];
    unavailableSelected = false;
    updateSubmitButton();
    renderMembers();
    renderDates();
  }

  function renderMembers() {
    document.getElementById('membersList').innerHTML = allMembers.map(m => `
      <div class="member-card ${selectedMember === m ? 'selected' : ''}" onclick="selectMember('${m}')">
        <div class="avatar">${avatarInitial(m)}</div>
        <span class="member-name">${m}</span>
      </div>
    `).join('');
  }

  function toggleDate(v) {
    if (!selectedMember) { alert('먼저 본인을 선택해주세요.'); return; }
    const i = selectedDates.indexOf(v);
    if (i > -1) selectedDates.splice(i, 1);
    else { selectedDates.push(v); unavailableSelected = false; }
    updateSubmitButton();
    renderDates();
  }

  function renderDates() {
    const datesHtml = weekDates.map(d => `
      <div class="date-card ${selectedDates.includes(d.value) ? 'selected' : ''}" onclick="toggleDate('${d.value}')">
        <div class="date-text">${d.display}</div>
        <div class="day-text">${d.dayName}</div>
      </div>
    `).join('');
    const unavailableHtml = `
      <div class="unavailable-card ${!selectedMember ? 'disabled' : ''} ${unavailableSelected ? 'selected' : ''}" id="unavailableCard" onclick="toggleUnavailable()">
        <div class="unavailable-text">모든 날짜<br>불가능</div>
      </div>
    `;
    document.getElementById('datesListContainer').innerHTML = datesHtml + unavailableHtml;
  }

  function formatDate(key) {
    const info = weekDates.find(d => d.value === key);
    return info ? `${info.display} (${info.dayName})` : key;
  }

  function renderScheduleTable() {
    const container = document.getElementById('scheduleTableContainer');
    const allDates = weekDates.map(d => d.value);
    const dateCounts = {};
    allDates.forEach(d => {
      dateCounts[d] = 0;
      allMembers.forEach(m => { if (availability[d] && availability[d][m]) dateCounts[d]++; });
    });

    let html = '<div class="schedule-wrap"><table class="schedule-table"><thead><tr><th>멤버</th>';
    allDates.forEach(d => { html += `<th>${formatDate(d)}</th>`; });
    html += '</tr></thead><tbody>';

    allMembers.forEach(m => {
      const isCurrent = m === selectedMember;
      const hasSubmitted = submittedMembers[m];
      let cls = '';
      if (isCurrent) cls = 'current-user';
      else if (!hasSubmitted) cls = 'not-submitted';

      html += `<tr class="${cls}"><td>
        <div class="member-name-cell">
          <span><strong>${m}</strong>${isCurrent ? '<span class="me-tag">나</span>' : ''}</span>
          <button class="edit-btn" onclick="editMemberSchedule('${m}')">수정</button>
        </div></td>`;

      if (!hasSubmitted) {
        html += `<td colspan="${allDates.length}">미입력</td>`;
      } else {
        allDates.forEach(d => {
          const avail = availability[d] && availability[d][m];
          html += `<td><span class="${avail ? 'check-yes' : 'check-no'}">${avail ? '✓' : '–'}</span></td>`;
        });
      }
      html += '</tr>';
    });

    html += '<tr class="total-row"><td>참석 가능 인원</td>';
    allDates.forEach(d => {
      html += `<td><span class="attendance-count">${dateCounts[d]}<span class="total"> / ${allMembers.length}</span></span></td>`;
    });
    html += '</tr></tbody></table></div>';
    container.innerHTML = html;
  }

  function updateBestDate() {
    const resultBox = document.getElementById('resultBox');
    const allDates = weekDates.map(d => d.value);
    let maxCount = 0, bestDates = [];
    allDates.forEach(d => {
      let count = 0;
      allMembers.forEach(m => { if (availability[d] && availability[d][m]) count++; });
      if (count > maxCount) { maxCount = count; bestDates = [d]; }
      else if (count === maxCount && count > 0) bestDates.push(d);
    });

    if (maxCount === 0) {
      resultBox.innerHTML = `
        <div class="result-empty">
          <h3>아직 참석 가능한 멤버가 없습니다</h3>
          <p>참석 가능한 날짜를 선택해주세요.</p>
        </div>`;
      return;
    }
    const best = bestDates.map(d => formatDate(d)).join(' · ');
    resultBox.innerHTML = `
      <div class="result-box">
        <div class="result-eyebrow">Best Pick</div>
        <h3>모두에게 가장 좋은 날짜</h3>
        <div class="best-date-text">${best}</div>
        <div class="attendance-text">${maxCount}명 참석 가능 <span class="pct">· ${allMembers.length}명 중</span></div>
        <br><button class="copy-btn" onclick="copyToClipboard()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          일정 복사하기
        </button>
      </div>`;
  }

  function updateSubmitButton() {
    const b = document.getElementById('submitBtn');
    b.disabled = !(selectedMember && (selectedDates.length > 0 || unavailableSelected));
  }

  function toggleUnavailable() {
    if (!selectedMember) { alert('먼저 본인을 선택해주세요.'); return; }
    unavailableSelected = !unavailableSelected;
    if (unavailableSelected) selectedDates = [];
    updateSubmitButton();
    renderDates();
  }

  function submitSelection() {
    if (!selectedMember) return;
    currentSavingMember = selectedMember;
    currentSavingDates = [...selectedDates];
    currentSavingUnavailable = selectedDates.length === 0;

    weekDates.forEach(d => {
      if (availability[d.value] && availability[d.value][selectedMember]) delete availability[d.value][selectedMember];
    });
    selectedDates.forEach(v => {
      if (!availability[v]) availability[v] = {};
      availability[v][selectedMember] = true;
    });
    submittedMembers[selectedMember] = true;
    saveData();

    selectedMember = null;
    selectedDates = [];
    unavailableSelected = false;
    renderMembers(); renderDates(); renderScheduleTable(); updateBestDate(); updateSubmitButton();
    alert('입력이 완료되었습니다!');
  }

  function editMemberSchedule(name) {
    selectedMember = name;
    selectedDates = [];
    unavailableSelected = false;
    weekDates.forEach(d => {
      if (availability[d.value] && availability[d.value][name]) selectedDates.push(d.value);
    });
    renderMembers(); renderDates(); updateSubmitButton();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    alert(`${name}의 일정을 수정합니다.\n날짜를 다시 선택한 후 "입력 완료"를 클릭하세요.`);
  }

  async function copyToClipboard() {
    const allDates = weekDates.map(d => d.value);
    let maxCount = 0, bestDates = [];
    allDates.forEach(d => {
      let c = 0;
      allMembers.forEach(m => { if (availability[d] && availability[d][m]) c++; });
      if (c > maxCount) { maxCount = c; bestDates = [d]; }
      else if (c === maxCount && c > 0) bestDates.push(d);
    });
    if (maxCount === 0) { alert('아직 참석 가능한 멤버가 없습니다.'); return; }
    const best = bestDates.map(d => formatDate(d)).join(', ');
    const attendees = [];
    bestDates.forEach(d => allMembers.forEach(m => { if (availability[d] && availability[d][m] && !attendees.includes(m)) attendees.push(m); }));
    const text = `📅 AI Study Crew 모임 일정\n날짜: ${best}\n참석 인원: ${maxCount}명 / ${allMembers.length}명\n참석 가능 멤버: ${attendees.join(', ')}`;
    try {
      await navigator.clipboard.writeText(text);
      alert('일정이 클립보드에 복사되었습니다! 📋');
    } catch (e) {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); alert('일정이 클립보드에 복사되었습니다! 📋'); }
      catch { alert('클립보드 복사에 실패했습니다.'); }
      document.body.removeChild(ta);
    }
  }

  loadData();
</script>
</body>
</html>
